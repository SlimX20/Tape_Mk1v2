<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tape MK1</title>
</head>

<body>

<h1>🎛️ Tape MK1</h1>

<!-- TRANSPORT -->
<button onclick="start()">▶ Play</button>
<button onclick="stop()">⏹ Stop</button>

<br><br>

<!-- GLOBAL CONTROLS -->
<label>BPM</label>
<input id="bpm" type="range" min="60" max="160" value="90">

<label>Swing</label>
<input id="swing" type="range" min="0" max="100" value="0">

<br><br>

<!-- RANDOM -->
<button onclick="randomize(kick, velocity.kick)">Random Kick</button>
<button onclick="randomize(snare, velocity.snare)">Random Snare</button>
<button onclick="randomize(hat, velocity.hat)">Random Hat</button>
<button onclick="randomBass()">Random Bass</button>

<br><br>

<!-- CLEAR -->
<button onclick="kick.fill(0); createGrid()">Clear Kick</button>
<button onclick="snare.fill(0); createGrid()">Clear Snare</button>
<button onclick="hat.fill(0); createGrid()">Clear Hat</button>
<button onclick="bass.fill(null); createBassGrid()">Clear Bass</button>

<br><br>

<!-- 🔥 MIXER (NYTT, ENDA TILLÄGG) -->
<h3>Mixer</h3>

<label>Kick</label>
<input type="range" min="0" max="100" value="90" oninput="setMix('kick', this.value)">

<label>Snare</label>
<input type="range" min="0" max="100" value="80" oninput="setMix('snare', this.value)">

<label>Hat</label>
<input type="range" min="0" max="100" value="50" oninput="setMix('hat', this.value)">

<label>Bass</label>
<input type="range" min="0" max="100" value="70" oninput="setMix('bass', this.value)">

<br><br>

<!-- GRIDS (TOUCH NOTHING) -->
<div id="grid"></div>

<br>

<div id="bassGrid"></div>

<script src="script.js"></script>

</body>
</html>
