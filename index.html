<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tape MK1 Grid</title>

<style>
body {
  background: #0b0b0b;
  color: #fff;
  font-family: monospace;
  padding: 12px;
}

/* TOP BAR */
.top {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 12px;
}

button {
  background: #1c1c1c;
  color: white;
  border: 1px solid #333;
  padding: 6px 10px;
}

/* GRID WRAPPER */
.grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* LANE */
.lane {
  display: flex;
  align-items: center;
  gap: 6px;
}

/* LABEL */
.label {
  width: 60px;
  opacity: 0.7;
}

/* STEPS */
.steps {
  display: flex;
  gap: 2px;
  flex: 1;
}

/* STEP BOX */
.step {
  width: 14px;
  height: 22px;
  background: #1a1a1a;
  border: 1px solid #222;
  transition: 0.1s;
}

/* ACTIVE STEP */
.step.on {
  background: #ff3c3c;
  box-shadow: 0 0 6px #ff3c3c;
}

/* PLAYHEAD */
.step.playhead {
  border-color: #00d9ff;
}
</style>
</head>

<body>

<div class="top">
  <button onclick="start()">▶ Play</button>
  <button onclick="stop()">⏹ Stop</button>

  <label>BPM</label>
  <input id="bpm" type="range" min="60" max="160" value="90">

  <label>Swing</label>
  <input id="swing" type="range" min="0" max="100" value="0">
</div>

<div class="grid">

  <div class="lane">
    <div class="label">KICK</div>
    <div id="kickRow" class="steps"></div>
  </div>

  <div class="lane">
    <div class="label">SNARE</div>
    <div id="snareRow" class="steps"></div>
  </div>

  <div class="lane">
    <div class="label">HAT</div>
    <div id="hatRow" class="steps"></div>
  </div>

  <div class="lane">
    <div class="label">BASS</div>
    <div id="bassRow" class="steps"></div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
