<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tape MK1</title>

<style>
body {
  background:#0b0b0b;
  color:white;
  font-family: monospace;
  padding:12px;
}

.top {
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
  margin-bottom:12px;
}

.grid {
  display:flex;
  flex-direction:column;
  gap:10px;
}

.lane {
  display:flex;
  align-items:center;
  gap:8px;
}

.label {
  width:70px;
}

.steps {
  display:flex;
  gap:2px;
  flex:1;
}

.step {
  width:14px;
  height:22px;
  background:#1a1a1a;
  border:1px solid #222;
}

.step.on {
  background:#ff3c3c;
}

.step.playhead {
  border-color:#00d9ff;
}

/* MIXER */
.mixer {
  margin-top:20px;
  border-top:1px solid #333;
  padding-top:10px;
}

.channel {
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="top">
  <button onclick="start()">▶ Play</button>
  <button onclick="stop()">⏹ Stop</button>

  BPM <input id="bpm" type="number" min="60" max="220" value="90">
  Swing <input id="swing" type="range" min="0" max="100" value="0">
</div>

<div class="grid">

  <div class="lane">
    <div class="label">KICK</div>
    <div id="kickRow" class="steps"></div>
    <button onclick="randomLane('kick')">RND</button>
    <button onclick="clearLane('kick')">CLR</button>
  </div>

  <div class="lane">
    <div class="label">SNARE</div>
    <div id="snareRow" class="steps"></div>
    <button onclick="randomLane('snare')">RND</button>
    <button onclick="clearLane('snare')">CLR</button>
  </div>

  <div class="lane">
    <div class="label">HAT</div>
    <div id="hatRow" class="steps"></div>
    <button onclick="randomLane('hat')">RND</button>
    <button onclick="clearLane('hat')">CLR</button>
  </div>

  <div class="lane">
    <div class="label">BASS</div>
    <div id="bassRow" class="steps"></div>
    <button onclick="randomLane('bass')">RND</button>
    <button onclick="clearLane('bass')">CLR</button>
  </div>

</div>

<!-- 🎛️ MIXER -->
<div class="mixer">

  <h3>MIXER</h3>

  <div class="channel">
    KICK vol
    <input type="range" min="0" max="100" value="80"
      oninput="setVolume('kick', this.value)">
    density
    <input type="range" min="0" max="100" value="100"
      oninput="setDensity('kick', this.value)">
  </div>

  <div class="channel">
    SNARE vol
    <input type="range" min="0" max="100" value="80"
      oninput="setVolume('snare', this.value)">
    density
    <input type="range" min="0" max="100" value="100"
      oninput="setDensity('snare', this.value)">
  </div>

  <div class="channel">
    HAT vol
    <input type="range" min="0" max="100" value="80"
      oninput="setVolume('hat', this.value)">
    density
    <input type="range" min="0" max="100" value="100"
      oninput="setDensity('hat', this.value)">
  </div>

  <div class="channel">
    BASS vol
    <input type="range" min="0" max="100" value="80"
      oninput="setVolume('bass', this.value)">
    density
    <input type="range" min="0" max="100" value="100"
      oninput="setDensity('bass', this.value)">
  </div>

  <button onclick="generateBass()">EUCLID BASS</button>

</div>

<script src="script.js"></script>

</body>
</html>
